# Site settings
title: 奇思妙想
author: umi
email: 9@umi.cat
lang: zh-CN
description: "umi 的个人博客，记录关于加密货币、安全研究、iOS 越狱等方面的技术探索与思考。"
url: "https://umi.cat"
