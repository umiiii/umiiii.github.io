google_analytics: G-9QG9K8G8G3
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
remote_theme: yous/whiteglass

# Build settings
plugins:
  - jekyll-archives
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap

comments: true

giscus:
  repo: "umiiii/umiiii.github.io"
  repo_id: "MDEwOlJlcG9zaXRvcnkyMDE0MzQyMTc="
  category: "Announcements"
  category_id: "DIC_kwDODAGkac4C632H"
  mapping: "pathname"
  reactions_enabled: "1"
  emit_metadata: "1"
  input_position: "bottom"
  theme: "light"
  lang: "zh-CN"

permalink: /:year/:month/:day/:title/
paginate_path: /posts/:num/
paginate: 5

jekyll-archives:
  enabled:
    - categories
    - tags
  layout: category_archives
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
